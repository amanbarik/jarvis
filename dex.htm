<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JARVIS AI</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#0b1f3a,#000);
    font-family:Segoe UI, sans-serif;
    color:#00eaff;
}
.jarvis{
    width:400px;
    height:600px;
    background:rgba(0,0,0,0.65);
    border-radius:18px;
    box-shadow:0 0 35px #00eaff;
    display:flex;
    flex-direction:column;
}
h1{
    text-align:center;
    margin:10px 0;
    letter-spacing:3px;
}
#chat{
    flex:1;
    overflow-y:auto;
    padding:10px;
    font-size:14px;
}
.you{color:#fff;margin-bottom:6px;}
.jarvis-msg{color:#00eaff;margin-bottom:10px;}
.input-box{
    display:flex;
    gap:5px;
    padding:10px;
}
input{
    flex:1;
    padding:8px;
    border-radius:6px;
    border:none;
    outline:none;
}
button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#00eaff;
    font-weight:bold;
    cursor:pointer;
}
.mic{
    text-align:center;
    padding-bottom:10px;
}
.circle{
    width:60px;
    height:60px;
    border-radius:50%;
    margin:8px auto;
    background:rgba(0,234,255,0.2);
    box-shadow:0 0 25px #00eaff;
    animation:pulse 1.5s infinite;
    display:none;
}
@keyframes pulse{
    0%{transform:scale(1)}
    50%{transform:scale(1.25)}
    100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="jarvis">
    <h1>JARVIS</h1>
    <div id="chat"></div>

    <div class="input-box">
        <input id="textInput" placeholder="Type command...">
        <button onclick="handleText()">Send</button>
    </div>

    <div class="mic">
        <button onclick="startListening()">🎤 Speak</button>
        <div class="circle" id="listenAnim"></div>
    </div>
</div>

<script>
/* ================== CONFIG ================== */
const OPENAI_API_KEY = "PASTE_YOUR_API_KEY_HERE";

/* ================== CORE ================== */
const chat=document.getElementById("chat");
const synth=window.speechSynthesis;

function speak(text){
    synth.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=1;
    u.pitch=0.85;
    u.lang="en-IN";
    synth.speak(u);
}

function add(text,cls){
    const d=document.createElement("div");
    d.className=cls;
    d.innerText=text;
    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
}

async function askAI(q){
    const res=await fetch("https://api.openai.com/v1/chat/completions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+OPENAI_API_KEY
        },
        body:JSON.stringify({
            model:"gpt-3.5-turbo",
            messages:[
                {role:"system",content:"You are JARVIS, a calm professional AI assistant."},
                {role:"user",content:q}
            ]
        })
    });
    const data=await res.json();
    return data.choices[0].message.content;
}

function processCommand(cmd){
    cmd=cmd.toLowerCase();
    add("You: "+cmd,"you");

    let response=null;

    if(cmd.includes("hello")||cmd.includes("hi"))
        response="Hello. How can I assist you?";

    else if(cmd.includes("your name"))
        response="I am JARVIS, your AI assistant.";

    else if(cmd.includes("how are you"))
        response="All systems are operating normally.";

    else if(cmd.includes("time"))
        response="Current time is "+new Date().toLocaleTimeString();

    else if(cmd.includes("date"))
        response="Today's date is "+new Date().toDateString();

    else if(cmd.includes("open youtube")){
        window.open("https://youtube.com","_blank");
        response="Opening YouTube.";
    }
    else if(cmd.includes("open google")){
        window.open("https://google.com","_blank");
        response="Opening Google.";
    }
    else if(cmd.includes("open facebook")){
        window.open("https://facebook.com","_blank");
        response="Opening Facebook.";
    }
    else if(cmd.includes("open instagram")){
        window.open("https://instagram.com","_blank");
        response="Opening Instagram.";
    }

    else if(cmd.includes("search")||cmd.includes("find")){
        let q=cmd.replace("search","").replace("find","");
        window.open("https://google.com/search?q="+q,"_blank");
        response="Searching for "+q;
    }

    else if(cmd.includes("play")){
        let q=cmd.replace("play","");
        window.open("https://youtube.com/results?search_query="+q,"_blank");
        response="Playing on YouTube.";
    }

    else if(cmd.match(/[0-9]/)){
        try{
            let exp=cmd.replace(/plus|add/g,"+")
                       .replace(/minus|subtract/g,"-")
                       .replace(/multiply|into/g,"*")
                       .replace(/divide/g,"/");
            response="Result is "+eval(exp);
        }catch{}
    }

    else if(cmd.includes("clear screen")){
        chat.innerHTML="";
        response="Screen cleared.";
    }

    else if(cmd.includes("reload")){
        speak("Reloading system.");
        location.reload();
        return;
    }

    if(response){
        add("Jarvis: "+response,"jarvis-msg");
        speak(response);
    }else{
        add("Jarvis: Processing your request.","jarvis-msg");
        speak("Processing your request.");
        askAI(cmd).then(r=>{
            add("Jarvis: "+r,"jarvis-msg");
            speak(r);
        }).catch(()=>{
            speak("I encountered an error.");
        });
    }
}

function handleText(){
    const i=document.getElementById("textInput");
    if(i.value.trim()){
        processCommand(i.value);
        i.value="";
    }
}

/* ================== VOICE ================== */
function startListening(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const rec=new SR();
    rec.lang="en-IN";
    rec.start();
    document.getElementById("listenAnim").style.display="block";

    rec.onresult=e=>{
        document.getElementById("listenAnim").style.display="none";
        processCommand(e.results[0][0].transcript);
    };
    rec.onerror=()=>{
        document.getElementById("listenAnim").style.display="none";
        speak("I did not catch that.");
    };
}
</script>

</body>
</html>
